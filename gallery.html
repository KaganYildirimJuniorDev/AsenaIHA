<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Asena İHA Takımı Fotoğraf Galerisi — Çalışmalarımız, etkinliklerimiz ve takım anılarımız.">
  <title>Fotoğraf Galerisi - Asena İHA</title>
  <link rel="icon" type="image/jpeg" href="assets/logo.jpeg">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* ========== Gallery Page Specific Styles ========== */

    /* Gallery Hero Banner */
    .gallery-hero {
      padding: 140px 0 60px;
      text-align: center;
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(99, 102, 241, 0.06) 0%, transparent 100%);
    }

    .gallery-hero::before {
      content: '';
      position: absolute;
      top: -100px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
      pointer-events: none;
      animation: orbFloat 20s ease-in-out infinite;
    }

    .gallery-hero .section-title {
      font-size: clamp(2.4rem, 6vw, 3.6rem);
      margin-bottom: 12px;
    }

    .gallery-hero .section-subtitle {
      margin-bottom: 0;
      font-size: 1.15rem;
    }

    .gallery-hero-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--accent-gradient);
      color: white;
      font-size: 1.5rem;
      margin-bottom: 24px;
      box-shadow: 0 8px 30px rgba(99, 102, 241, 0.2);
      animation: float 4s ease-in-out infinite;
    }

    /* Photo Counter Badge */
    .gallery-count-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      margin-top: 24px;
      background: var(--bg-card);
      border: 1px solid var(--border-glass);
      border-radius: 100px;
      font-size: 0.85rem;
      color: var(--text-secondary);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow-sm);
    }

    .gallery-count-badge i {
      color: var(--accent-1);
    }

    /* Enhanced Gallery Grid */
    .gallery-section {
      padding: 40px 0 100px;
    }

    .gallery-grid-enhanced {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .gallery-card {
      position: relative;
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      background: var(--bg-card);
      border: 1px solid var(--border-glass);
      box-shadow: var(--shadow-card);
      transition: var(--transition-smooth);
      aspect-ratio: 4 / 3;
    }

    .gallery-card:nth-child(3n+1) {
      aspect-ratio: 4 / 3;
    }

    .gallery-card:nth-child(3n+2) {
      aspect-ratio: 3 / 4;
    }

    .gallery-card:nth-child(3n+3) {
      aspect-ratio: 1;
    }

    .gallery-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .gallery-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 60px rgba(99, 102, 241, 0.15);
      border-color: rgba(99, 102, 241, 0.25);
    }

    .gallery-card:hover img {
      transform: scale(1.08);
    }

    /* Overlay on hover */
    .gallery-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 40%, rgba(0, 0, 0, 0.6) 100%);
      opacity: 0;
      transition: opacity 0.4s ease;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 20px;
    }

    .gallery-card:hover .gallery-card-overlay {
      opacity: 1;
    }

    .gallery-card-overlay span {
      color: white;
      font-size: 0.9rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .gallery-card-overlay span i {
      font-size: 1.2rem;
    }

    /* Enhanced Lightbox / Modal */
    #galleryModal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(20px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 2000;
    }

    #galleryModal.open {
      opacity: 1;
      pointer-events: auto;
    }

    #galleryModal img {
      max-width: 85%;
      max-height: 85vh;
      border-radius: var(--radius-lg);
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.5);
      transform: scale(0.9);
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    #galleryModal.open img {
      transform: scale(1);
    }

    .modal-close {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-fast);
      backdrop-filter: blur(10px);
    }

    .modal-close:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: rotate(90deg);
    }

    .modal-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-fast);
      backdrop-filter: blur(10px);
    }

    .modal-nav:hover {
      background: rgba(255, 255, 255, 0.2);
    }

    .modal-nav.prev {
      left: 24px;
    }

    .modal-nav.next {
      right: 24px;
    }

    .modal-counter {
      position: absolute;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.85rem;
      font-weight: 500;
    }

    /* Responsive Gallery */
    @media (max-width: 768px) {
      .gallery-grid-enhanced {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 12px;
      }

      .gallery-card:nth-child(n) {
        aspect-ratio: 4 / 3;
      }

      .modal-nav.prev {
        left: 12px;
      }

      .modal-nav.next {
        right: 12px;
      }

      #galleryModal img {
        max-width: 95%;
        border-radius: var(--radius-sm);
      }
    }

    /* Empty State */
    .gallery-empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .gallery-empty i {
      font-size: 3rem;
      margin-bottom: 16px;
      opacity: 0.3;
    }

    .gallery-empty p {
      font-size: 1.1rem;
    }
  </style>
</head>

<body>
  <!-- ========== Navbar ========== -->
  <nav class="navbar" id="navbar">
    <div class="container">
      <a href="index.html#hero" class="nav-brand">
        <img src="assets/logo.jpeg" alt="Asena Logo" class="brand-logo">
        ASENA
        <span class="beta-badge">BETA</span>
      </a>
      <button class="theme-toggle" id="themeToggle" title="Tema Değiştir" aria-label="Tema Değiştir">
        <i class="fas fa-sun theme-icon-light"></i>
        <i class="fas fa-moon theme-icon-dark"></i>
        <span class="toggle-slider"></span>
      </button>
      <div class="nav-links" id="navLinks">
        <a href="index.html#hero">Ana Sayfa</a>
        <a href="index.html#about">Hakkımızda</a>
        <a href="index.html#team">Ekibimiz</a>
        <a href="gallery.html" class="active"><i class="fas fa-images"></i> Galeri</a>
        <a href="index.html#contact">İletişim</a>
        <a href="api-panel.html" class="nav-cta"><i class="fas fa-terminal"></i> Uçuş/Kontrol</a>
      </div>
      <div class="nav-toggle" id="navToggle">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
  </nav>

  <!-- ========== Gallery Hero ========== -->
  <section class="gallery-hero">
    <div class="container">
      <div class="gallery-hero-icon">
        <i class="fas fa-camera-retro"></i>
      </div>
      <h1 class="section-title">Fotoğraf Galerisi</h1>
      <p class="section-subtitle">Takımımızın çalışma anları, etkinlikler ve unutulmaz kareler.</p>
      <div class="gallery-count-badge" id="photoCount">
        <i class="fas fa-images"></i>
        <span>Yükleniyor...</span>
      </div>
    </div>
  </section>

  <!-- ========== Gallery Grid ========== -->
  <section class="gallery-section">
    <div class="container">
      <div id="galleryGrid" class="gallery-grid-enhanced">
        <!-- JavaScript will populate this -->
      </div>
    </div>
  </section>

  <!-- ========== Lightbox Modal ========== -->
  <div id="galleryModal">
    <button class="modal-close" onclick="closeModal()" aria-label="Kapat">
      <i class="fas fa-times"></i>
    </button>
    <button class="modal-nav prev" onclick="navigateModal(-1)" aria-label="Önceki">
      <i class="fas fa-chevron-left"></i>
    </button>
    <img src="" alt="Galeri Görseli">
    <button class="modal-nav next" onclick="navigateModal(1)" aria-label="Sonraki">
      <i class="fas fa-chevron-right"></i>
    </button>
    <div class="modal-counter" id="modalCounter"></div>
  </div>

  <!-- ========== Footer ========== -->
  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <span class="footer-copy">&copy; 2026 Asena İHA Takımı. Tüm hakları saklıdır.</span>
        <div class="footer-links">
          <a href="index.html#hero">Ana Sayfa</a>
          <a href="index.html#about">Hakkımızda</a>
          <a href="index.html#team">Ekibimiz</a>
          <a href="api-panel.html">API Panel</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script src="js/gallery.js"></script>
</body>

</html>
